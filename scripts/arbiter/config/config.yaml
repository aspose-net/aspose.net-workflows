# API Docs PR Arbiter Configuration
# Environment variables can be used with ${VAR_NAME} syntax

# GitHub Configuration
github:
  token: ${GITHUB_TOKEN}

# Metrics Logging Configuration
metrics:
  enabled: true
  endpoint: https://script.google.com/macros/s/AKfycbyCHwElrM6RcYLi0JNQAkJmzGrBjAhf28mKXVyub_6SdaZ2ITvzCwfM5xCLE7rmuxio/exec
  token: lM6iU2mW0gV1eZ
  agent_name: API Docs PR Arbiter
  agent_owner: Muhammad Muqarrab
  job_type: pr_review
  item_name: Pull Requests
  website_section: API Reference

# GPT-OSS API Configuration (for AI-powered PR review)
gpt_oss:
  endpoint: ${GPT_OSS_ENDPOINT}
  api_key: ${GPT_OSS_API_KEY}
  model: gpt-4o-mini
  timeout: 120

# Review Settings
review:
  checklist_path: config/checklist.yaml
  pr_branch_prefix: "api-update-"
  auto_merge: false
  pr_labels: []
  post_review_comment: true
  score_thresholds:
    approve: 70
    request_changes: 40
  file_filter:
    path_contains: null  # review all .md files in the PR

# Product Repositories
products:
  aspose-net-api:
    content_repo: https://github.com/Aspose/aspose.net
    branch: main

# Prompt File Paths
prompts:
  review_pr: config/prompts/review.txt

# Monitoring Settings
monitoring:
  check_interval_hours: 4
  stale_review_hours: 48

# Logging Settings
logging:
  level: INFO
  dir: logs
  rotation: daily
